[project]
name = "volo-longhorizon"
version = "0.1.0"
description = "Volo long-horizon rig — surface memory drift / context rot over N replayed episodes."
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = ["volo-core", "volo-sdk", "volo-simulator", "volo-reliability"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/volo_longhorizon"]
