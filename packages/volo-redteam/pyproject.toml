[project]
name = "volo-redteam"
version = "0.1.0"
description = "Volo red-team — adversarial attack corpus + safety annex, run entirely in the sim."
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = ["volo-core", "volo-sdk", "volo-simulator"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/volo_redteam"]
