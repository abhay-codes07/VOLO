[project]
name = "volo-scenarios"
version = "0.1.0"
description = "Volo Scenario Generator — typed adversarial mutations on a Recording."
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = ["volo-core"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/volo_scenarios"]
