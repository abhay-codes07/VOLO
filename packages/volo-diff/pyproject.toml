[project]
name = "volo-diff"
version = "0.1.0"
description = "Volo Root-cause / regression diffing — git bisect for agents (bible §4 subsystem 6)."
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = ["volo-core"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/volo_diff"]
