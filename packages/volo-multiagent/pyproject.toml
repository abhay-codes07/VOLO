[project]
name = "volo-multiagent"
version = "0.1.0"
description = "Volo multi-agent — test orchestrators by simulating their sub-agents as counterparties."
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = ["volo-core", "volo-sdk", "volo-simulator", "volo-personas"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/volo_multiagent"]
