[project]
name = "volo-core"
version = "0.1.0"
description = "Volo core domain: Recording schema, interfaces, redaction primitives. No I/O, no LLM."
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "Volo contributors" }]
dependencies = [
  "pydantic>=2.9",
  "sqlmodel>=0.0.21",
]

# Asymmetric (Ed25519) signing is opt-in — `volo_core.asymmetric` lazily imports it, so the OSS
# core stays lean and only signing paths that want asymmetric pull the crypto dependency.
[project.optional-dependencies]
crypto = ["cryptography>=42"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/volo_core"]
