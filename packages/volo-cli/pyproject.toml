[project]
name = "volo-cli"
version = "0.1.0"
description = "Volo CLI — `volo record | sim | run | ci | diff`."
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "Volo contributors" }]
dependencies = [
  "volo-core",
  "volo-sdk",
  "volo-mcp",
  "volo-shadow",
  "volo-redteam",
  "typer>=0.12",
  "rich>=13.7",
  "python-dotenv>=1.0.1",
]

[project.scripts]
volo = "volo_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/volo_cli"]
