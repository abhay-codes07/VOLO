name: "Volo PR reliability check"
description: "Run volo ci against a baseline recording and post a sticky reliability (+ optional compliance) comment on the PR."
author: "Volo"

inputs:
  baseline:
    description: "Path to the baseline Recording JSON."
    required: true
  agent:
    description: "Agent entrypoint, e.g. my_pkg.agent:run."
    required: true
  input:
    description: "JSON input passed to the agent."
    required: false
    default: "{}"
  fail-under:
    description: "Reliability threshold (0-1)."
    required: false
    default: "0.9"
  frameworks:
    description: "If set (e.g. 'all' or 'eu_ai_act'), also build a compliance evidence pack."
    required: false
    default: ""
  github-token:
    description: "Token used to post the PR comment."
    required: false
    default: ${{ github.token }}

runs:
  using: "composite"
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install project
      shell: bash
      run: uv sync

    - name: Run volo ci
      id: ci
      shell: bash
      continue-on-error: true
      run: |
        uv run volo ci "${{ inputs.baseline }}" \
          --agent "${{ inputs.agent }}" \
          --input '${{ inputs.input }}' \
          --fail-under "${{ inputs.fail-under }}" \
          --out report.json
        echo "code=$?" >> "$GITHUB_OUTPUT"

    - name: Build compliance evidence (optional)
      if: ${{ inputs.frameworks != '' }}
      shell: bash
      run: |
        uv run volo compliance build --agent "${{ inputs.agent }}" \
          --reliability report.json --framework "${{ inputs.frameworks }}" \
          --out evidence.json || true

    - name: Render PR comment
      shell: bash
      run: |
        EV=""
        [ -f evidence.json ] && EV="--evidence evidence.json"
        uv run volo comment --report report.json $EV --out comment.md

    - name: Post sticky PR comment
      if: ${{ github.event_name == 'pull_request' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR: ${{ github.event.pull_request.number }}
      run: |
        MARKER="<!-- volo-pr-check -->"
        BODY="$(cat comment.md)"
        CID="$(gh api "repos/$GITHUB_REPOSITORY/issues/$PR/comments" --paginate \
          --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" | head -n1)"
        if [ -n "$CID" ]; then
          gh api -X PATCH "repos/$GITHUB_REPOSITORY/issues/comments/$CID" -f body="$BODY"
        else
          gh api -X POST "repos/$GITHUB_REPOSITORY/issues/$PR/comments" -f body="$BODY"
        fi

    - name: Fail if reliability regressed
      shell: bash
      run: exit ${{ steps.ci.outputs.code }}
