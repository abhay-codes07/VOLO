[project]
name = "volo-personas"
version = "0.1.0"
description = "Volo simulated users & counterparties — persona-driven, seeded, deterministic."
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = ["volo-core", "volo-simulator"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/volo_personas"]
