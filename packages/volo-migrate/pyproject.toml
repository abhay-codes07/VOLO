[project]
name = "volo-migrate"
version = "0.1.0"
description = "Volo model-migration lab — compare an agent's reliability + cost across two models."
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = ["volo-core", "volo-diff", "volo-reliability", "volo-models"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/volo_migrate"]
