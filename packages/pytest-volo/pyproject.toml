[project]
name = "pytest-volo"
version = "0.1.0"
description = "pytest plugin for Volo — agent reliability tests as plain unit tests."
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = [
  "pytest>=8.0",
  "volo-core",
  "volo-simulator",
  "volo-scenarios",
  "volo-reliability",
  "volo-runner",
  "volo-mcp",
]

[project.entry-points.pytest11]
volo = "pytest_volo.plugin"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pytest_volo"]
