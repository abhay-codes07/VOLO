[project]
name = "volo-computeruse"
version = "0.1.0"
description = "Volo computer-use — record/replay browser & desktop agents at the action-event level."
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = ["volo-core", "volo-sdk", "volo-simulator"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/volo_computeruse"]
