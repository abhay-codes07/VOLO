[project]
name = "volo-sdk"
version = "0.1.0"
description = "Volo Capture SDK — instruments any framework and writes a Recording."
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "Volo contributors" }]
dependencies = [
  "volo-core",
  "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/volo_sdk"]
