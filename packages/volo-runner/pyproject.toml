[project]
name = "volo-runner"
version = "0.1.0"
description = "Volo deterministic CI runner core (bible §4 subsystem 5)."
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = ["volo-core", "volo-simulator", "volo-scenarios", "volo-reliability"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/volo_runner"]
