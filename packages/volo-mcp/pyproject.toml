[project]
name = "volo-mcp"
version = "0.1.0"
description = "Volo MCP simulation — record, replay, and (future) fuzz Model Context Protocol servers."
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = ["volo-core", "volo-sdk", "volo-simulator", "volo-scenarios"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/volo_mcp"]
