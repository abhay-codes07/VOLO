[project]
name = "volo-simulator"
version = "0.1.0"
description = "Volo Environment Simulator — Tier-1 replay + (future) Tier-2 source-informed sim."
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
dependencies = ["volo-core"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/volo_simulator"]
