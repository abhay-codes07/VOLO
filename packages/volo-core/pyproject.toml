[project]
name = "volo-core"
version = "0.1.0"
description = "Volo core domain: Recording schema, interfaces, redaction primitives. No I/O, no LLM."
requires-python = ">=3.12"
license = { text = "Apache-2.0" }
authors = [{ name = "Volo contributors" }]
dependencies = [
  "pydantic>=2.9",
  "sqlmodel>=0.0.21",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/volo_core"]
